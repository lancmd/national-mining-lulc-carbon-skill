    <circle cx="650" cy="208" r="25" fill="#bceee0"/><path d="M639 203h22M639 214h14M663 214h-2" stroke="#12645f" stroke-width="4" stroke-linecap="round"/>
    <text class="sans" x="700" y="201" font-size="27" font-weight="800" fill="#fff">MAESA Local Agent</text>
    <text class="sans" x="700" y="229" font-size="17" fill="#d5f5ec">LLM Copilot · local MCP · confirmation-gated execution</text>
  </g>
  <path d="M900 255V290M290 255V290M1510 255V290" stroke="#2f7a79" stroke-width="3" marker-end="url(#arrow)"/><path d="M900 275H290M900 275H1510" stroke="#2f7a79" stroke-width="3"/>
  <g class="sans" filter="url(#shadow)">
    <path d="M105 292 290 252 475 292 290 332Z" fill="#b8e8eb" stroke="#2f7a79" stroke-width="2"/><text x="290" y="298" text-anchor="middle" class="label">Methods ｜ 研究方法</text>
    <path d="M625 292 900 246 1175 292 900 338Z" fill="#b8e8eb" stroke="#2f7a79" stroke-width="2"/><text x="900" y="298" text-anchor="middle" class="label">Workflow ｜ 核心流程</text>
    <path d="M1325 292 1510 252 1695 292 1510 332Z" fill="#b8e8eb" stroke="#2f7a79" stroke-width="2"/><text x="1510" y="298" text-anchor="middle" class="label">Outputs ｜ 研究成果</text>
