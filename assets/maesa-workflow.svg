<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1180" viewBox="0 0 1440 1180" role="img" aria-labelledby="title desc">
  <title id="title">MAESA Agent bilingual workflow</title>
  <desc id="desc">A concise five-stage local-first workflow for mining-area ecological space analysis.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b455b"/><stop offset="1" stop-color="#0f7d70"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#e5f7f2"/><stop offset="1" stop-color="#c9ece7"/></linearGradient>
    <linearGradient id="final" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff2d7"/><stop offset="1" stop-color="#ffe4ad"/></linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0b455b" flood-opacity=".13"/></filter>
    <marker id="flow-arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto"><path d="M1 1 11 6 1 11z" fill="#2e7d7a"/></marker>
    <style>
      .sans { font-family: 'Noto Sans SC','Microsoft YaHei','Segoe UI',Arial,sans-serif; }
      .eyebrow { font-size: 18px; font-weight: 800; letter-spacing: 4px; fill: #33767b; }
      .headline { font-size: 36px; font-weight: 800; fill: #104e5a; }
      .subtitle { font-size: 18px; fill: #52767b; }
      .pill { font-size: 15px; font-weight: 700; fill: #246168; letter-spacing: .3px; }
      .number { font-size: 26px; font-weight: 800; fill: #fff; }
      .stage { font-size: 26px; font-weight: 800; fill: #164f59; }
      .detail { font-size: 17px; fill: #4b6f75; }
      .final-stage { font-size: 26px; font-weight: 800; fill: #805116; }
      .final-detail { font-size: 17px; fill: #946523; }
      .side-label { font-size: 14px; font-weight: 800; letter-spacing: 2.5px; fill: #5b8585; }
    </style>
  </defs>

  <rect width="1440" height="1180" fill="#f8fbfa"/>
  <path d="M0 1082 C225 1015 378 1140 607 1070 C831 1001 1014 1128 1230 1055 C1308 1028 1379 1028 1440 1044 V1180 H0Z" fill="#e2f2df"/>
  <path d="M0 1105 C229 1038 379 1154 610 1085 C834 1016 1013 1142 1233 1070 C1310 1044 1380 1044 1440 1060" fill="none" stroke="#9bcaa2" stroke-width="4"/>

  <g class="sans">
    <text x="720" y="58" text-anchor="middle" class="eyebrow">LOCAL-FIRST · REPRODUCIBLE · HUMAN-CONFIRMED</text>
    <text x="720" y="106" text-anchor="middle" class="headline">MAESA Agent Workflow ｜ 矿区生态空间分析工作流</text>
    <text x="720" y="138" text-anchor="middle" class="subtitle">从用户本地数据到可验证的土地利用、情景预测、生态服务与成果地图</text>
  </g>

  <g class="sans" filter="url(#shadow)">
    <rect x="280" y="174" width="880" height="74" rx="18" fill="url(#hero)"/>
    <circle cx="332" cy="211" r="22" fill="#c7f1e5"/><path d="M321 205h22M321 216h14M345 216h-2" stroke="#126860" stroke-width="4" stroke-linecap="round"/>
    <text x="377" y="205" font-size="23" font-weight="800" fill="#fff">MAESA Local Agent</text>
    <text x="377" y="229" font-size="16" fill="#d8f6ee">LLM Copilot · local MCP · confirmed local execution</text>
  </g>

  <g class="sans">
    <rect x="294" y="274" width="190" height="31" rx="15" fill="#e5f3db"/><text x="389" y="295" text-anchor="middle" class="pill">USER DATA ｜ 用户数据</text>
    <rect x="524" y="274" width="190" height="31" rx="15" fill="#dcefee"/><text x="619" y="295" text-anchor="middle" class="pill">LOCAL AGENT ｜ 本地智能体</text>
    <rect x="754" y="274" width="190" height="31" rx="15" fill="#dcefee"/><text x="849" y="295" text-anchor="middle" class="pill">DESKTOP GIS ｜ 本地软件</text>
    <rect x="984" y="274" width="190" height="31" rx="15" fill="#fff0d0"/><text x="1079" y="295" text-anchor="middle" class="pill">OUTPUTS ｜ 研究成果</text>
  </g>

  <text x="120" y="360" class="sans side-label">INPUT</text>
  <path d="M120 373h105" stroke="#94bcb6" stroke-width="2"/>
  <text x="1195" y="1025" class="sans side-label">DELIVERY</text>
  <path d="M1195 1038h125" stroke="#94bcb6" stroke-width="2"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="250" y="330" width="940" height="112" rx="16" fill="url(#card)" stroke="#2e7d7a" stroke-width="2"/>
    <circle cx="306" cy="386" r="29" fill="#4a9da1"/><text x="306" y="395" text-anchor="middle" class="number">1</text>
    <text x="364" y="378" class="stage">Project intake &amp; preflight ｜ 项目输入与空间预检</text>
    <text x="364" y="410" class="detail">Imagery · ROI / model · mine boundary · drivers · carbon table · w.dat · 30 m grid</text>
  </g>
  <path d="M720 444V486" fill="none" stroke="#2e7d7a" stroke-width="4" marker-end="url(#flow-arrow)"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="250" y="502" width="940" height="112" rx="16" fill="url(#card)" stroke="#2e7d7a" stroke-width="2"/>
    <circle cx="306" cy="558" r="29" fill="#4a9da1"/><text x="306" y="567" text-anchor="middle" class="number">2</text>
    <text x="364" y="550" class="stage">Multi-period LULC ｜ 多期土地利用制图</text>
    <text x="364" y="582" class="detail">ENVI supervised classification / PyTorch inference · LULC maps · OA · F1 · IoU</text>
  </g>
  <path d="M720 616V658" fill="none" stroke="#2e7d7a" stroke-width="4" marker-end="url(#flow-arrow)"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="250" y="674" width="940" height="112" rx="16" fill="url(#card)" stroke="#2e7d7a" stroke-width="2"/>
    <circle cx="306" cy="730" r="29" fill="#4a9da1"/><text x="306" y="739" text-anchor="middle" class="number">3</text>
    <text x="364" y="722" class="stage">Change analysis &amp; PLUS ｜ 转移分析与四情景预测</text>
    <text x="364" y="754" class="detail">Sankey transition · ND · UD · EP · RE · FoM and stability validation</text>
  </g>
  <path d="M720 788V830" fill="none" stroke="#2e7d7a" stroke-width="4" marker-end="url(#flow-arrow)"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="250" y="846" width="940" height="112" rx="16" fill="url(#card)" stroke="#2e7d7a" stroke-width="2"/>
    <circle cx="306" cy="902" r="29" fill="#4a9da1"/><text x="306" y="911" text-anchor="middle" class="number">4</text>
    <text x="364" y="894" class="stage">InVEST &amp; ecosystem services ｜ 碳储与生态服务评价</text>
    <text x="364" y="926" class="detail">Carbon storage · Water Yield · Habitat Quality · Min-Max / AHP · sensitivity</text>
  </g>
  <path d="M720 960V1002" fill="none" stroke="#2e7d7a" stroke-width="4" marker-end="url(#flow-arrow)"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="250" y="1018" width="940" height="92" rx="16" fill="url(#final)" stroke="#d6922c" stroke-width="2"/>
    <circle cx="306" cy="1064" r="29" fill="#d98d28"/><text x="306" y="1073" text-anchor="middle" class="number">5</text>
    <text x="364" y="1056" class="final-stage">Cartography &amp; delivery ｜ ArcGIS Pro 出图与可追溯交付</text>
    <text x="364" y="1087" class="final-detail">LULC · Sankey · PLUS scenarios · carbon · water yield · habitat · PDF / PNG · manifest</text>
  </g>

  <g class="sans">
    <rect x="385" y="1135" width="670" height="30" rx="15" fill="#0e6e67"/>
    <text x="720" y="1156" text-anchor="middle" font-size="15" font-weight="800" fill="#e9fff7" letter-spacing=".5">LOCAL DATA STAY LOCAL ｜ 本地数据、本地软件、本地可追溯成果</text>
  </g>
</svg>
