    <rect x="108" y="820" width="364" height="86" rx="10" fill="#e6f5d7" stroke="#6da262" stroke-width="2"/><text x="135" y="856" class="card">ArcGIS Pro ｜ 空间制图</text><text x="135" y="883" class="card-sub">30 m grid · layout · PDF/PNG · QA</text>
    <rect x="108" y="928" width="364" height="50" rx="10" fill="#fff2cf" stroke="#d79e3f" stroke-width="2"/><text x="290" y="960" text-anchor="middle" font-size="17" font-weight="700" fill="#93611b">Local-first MCP · 本地软件受控执行</text>
  </g>
