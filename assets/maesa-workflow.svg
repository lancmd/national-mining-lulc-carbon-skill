      <rect x="635" y="866" width="570" height="76" rx="10" fill="url(#stage)" stroke="#2f7a79" stroke-width="2"/><text x="665" y="899" class="stage">Ecosystem services ｜ 碳储与生态服务评价</text><text x="665" y="924" class="sub">InVEST Carbon · Water Yield · Habitat · Min-Max / AHP · sensitivity</text>
      <rect x="635" y="955" width="570" height="48" rx="8" fill="#eff9e8" stroke="#87ae7e" stroke-width="2"/><text x="920" y="986" text-anchor="middle" class="tiny">Carbon storage · water supply · habitat quality · integrated score</text>
    </g>
  </g>
  <g class="sans" filter="url(#shadow)">
    <rect x="1328" y="388" width="364" height="92" rx="10" fill="#f5fff1" stroke="#63a55d" stroke-width="2"/><text x="1356" y="425" class="output">LULC Maps ｜ 土地利用图</text><text x="1356" y="453" class="output-sub">Multi-year raster · class areas · accuracy report</text>
    <rect x="1328" y="502" width="364" height="92" rx="10" fill="#f5fff1" stroke="#63a55d" stroke-width="2"/><text x="1356" y="539" class="output">Sankey &amp; Transitions ｜ 转移图</text><text x="1356" y="567" class="output-sub">Conversion matrix · flow diagram · change statistics</text>
    <rect x="1328" y="616" width="364" height="92" rx="10" fill="#f5fff1" stroke="#63a55d" stroke-width="2"/><text x="1356" y="653" class="output">PLUS Forecasts ｜ 四情景预测图</text><text x="1356" y="681" class="output-sub">ND · UD · EP · RE · validated scenario maps</text>
    <rect x="1328" y="730" width="364" height="92" rx="10" fill="#f5fff1" stroke="#63a55d" stroke-width="2"/><text x="1356" y="767" class="output">Ecosystem Maps ｜ 生态服务图</text><text x="1356" y="795" class="output-sub">Carbon · water yield · habitat · service score</text>
    <rect x="1328" y="844" width="364" height="92" rx="10" fill="#f5fff1" stroke="#63a55d" stroke-width="2"/><text x="1356" y="881" class="output">Publication Package ｜ 可发表成果</text><text x="1356" y="909" class="output-sub">ArcGIS PDF/PNG · manifest · provenance · QA</text>
    <rect x="1328" y="957" width="364" height="34" rx="8" fill="#fff2cf" stroke="#d79e3f" stroke-width="2"/><text x="1510" y="980" text-anchor="middle" font-size="15" font-weight="700" fill="#93611b">Automatic checks + human visual review</text>
  </g>
  <path d="M508 680H532M1268 680H1290" stroke="#2f7a79" stroke-width="4" marker-end="url(#arrow)"/>
  <g class="sans" filter="url(#shadow)"><rect x="360" y="1066" width="1080" height="58" rx="12" fill="#f3a344"/><text x="900" y="1103" text-anchor="middle" font-size="22" font-weight="800" fill="#55350d">Local data stay local ｜ 本地数据、本地软件与可追溯科研成果</text></g>
