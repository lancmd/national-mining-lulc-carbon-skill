    <rect x="108" y="496" width="364" height="86" rx="10" fill="#e6f5d7" stroke="#6da262" stroke-width="2"/><text x="135" y="532" class="card">ENVI / PyTorch ｜ 土地利用分类</text><text x="135" y="559" class="card-sub">ROI supervision · trained model · OA/F1/IoU</text>
    <rect x="108" y="604" width="364" height="86" rx="10" fill="#e6f5d7" stroke="#6da262" stroke-width="2"/><text x="135" y="640" class="card">PLUS ｜ 情景模拟</text><text x="135" y="667" class="card-sub">ND · UD · EP · RE / w.dat or subsidence raster</text>
