<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">MAESA Agent end-to-end workflow</title>
  <desc id="desc">Bilingual local-first mining-area ecological space analysis workflow.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b4055"/><stop offset="1" stop-color="#147b71"/></linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#d9f5f2"/><stop offset="1" stop-color="#b8e5df"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#093f4f" flood-opacity=".12"/></filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M1 1 11 6 1 11z" fill="#2f7a79"/></marker>
    <style>
      .sans { font-family: 'Noto Sans SC','Microsoft YaHei','Segoe UI',Arial,sans-serif; }
      .tiny { font-size: 16px; fill: #4a6970; } .label { font-size: 22px; font-weight: 700; fill: #174f59; letter-spacing: .3px; }
      .stage { font-size: 24px; font-weight: 750; fill: #124b56; } .sub { font-size: 16px; fill: #447077; }
      .card { font-size: 20px; font-weight: 650; fill: #234d55; } .card-sub { font-size: 15px; fill: #52747a; }
      .output { font-size: 20px; font-weight: 700; fill: #225c4f; } .output-sub { font-size: 15px; fill: #4d7465; }
    </style>
  </defs>
  <rect width="1800" height="1180" fill="#f7fbfa"/>
  <path d="M0 1080 C240 985 425 1135 680 1058 C895 993 1075 1115 1330 1032 C1500 977 1650 1035 1800 980 V1180 H0Z" fill="#dff0dc"/>
  <path d="M0 1102 C250 1010 420 1148 680 1074 C900 1011 1070 1128 1325 1050 C1505 995 1650 1050 1800 998" fill="none" stroke="#95c59e" stroke-width="4" opacity=".75"/>
  <g class="sans">
    <text x="900" y="54" text-anchor="middle" font-size="21" font-weight="700" fill="#347379" letter-spacing="5">LOCAL-FIRST · REPRODUCIBLE · HUMAN-CONFIRMED</text>
    <text x="900" y="98" text-anchor="middle" font-size="34" font-weight="800" fill="#124e58">MAESA Agent Workflow ｜ 矿区生态空间分析工作流</text>
    <text x="900" y="130" text-anchor="middle" font-size="18" fill="#5a7d82">从本地数据到情景模拟、生态服务与可发表地图 · From local data to validated research outputs</text>
  </g>
  <g filter="url(#shadow)">
