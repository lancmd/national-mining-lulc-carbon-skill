      <rect x="635" y="542" width="570" height="76" rx="10" fill="url(#stage)" stroke="#2f7a79" stroke-width="2"/><text x="665" y="575" class="stage">Multi-period LULC ｜ 多期土地利用制图</text><text x="665" y="600" class="sub">ENVI classification / PyTorch inference · accuracy assessment</text>
      <rect x="635" y="631" width="570" height="48" rx="8" fill="#eff9e8" stroke="#87ae7e" stroke-width="2"/><text x="920" y="662" text-anchor="middle" class="tiny">LULC_Year.tif · confidence · confusion matrix · OA / Macro-F1 / IoU</text>
    </g>
    <path d="M900 680V708" stroke="#2f7a79" stroke-width="3" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <circle cx="592" cy="742" r="28" fill="#8cd6dc" stroke="#27747a" stroke-width="2"/><text x="592" y="751" text-anchor="middle" font-size="25" font-weight="800" fill="#fff">3</text>
      <rect x="635" y="704" width="570" height="76" rx="10" fill="url(#stage)" stroke="#2f7a79" stroke-width="2"/><text x="665" y="737" class="stage">Change &amp; PLUS scenarios ｜ 转移与四情景</text><text x="665" y="762" class="sub">Sankey · ND / UD / EP / RE · subsidence depth as RE core driver</text>
      <rect x="635" y="793" width="570" height="48" rx="8" fill="#eff9e8" stroke="#87ae7e" stroke-width="2"/><text x="920" y="824" text-anchor="middle" class="tiny">Transition matrix · PLUS_ND/UD/EP/RE.tif · FoM · stability</text>
    </g>
    <path d="M900 842V870" stroke="#2f7a79" stroke-width="3" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
