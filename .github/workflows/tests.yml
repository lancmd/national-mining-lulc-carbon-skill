name: tests

on:
  push:
  pull_request:

jobs:
  windows-contracts:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".\mcp_server[validation,dev]"
      - run: python -m compileall -q scripts mcp_server tests
      - run: python -m pytest tests/test_smoke_suite.py -q
      - run: python .\tests\mcp_smoke.py
