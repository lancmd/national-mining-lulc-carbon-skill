name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-contracts:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".\mcp_server[validation,dev]"
      - run: python -m compileall -q scripts mcp_server tests
      - name: Run contract tests
        shell: pwsh
        run: |
          python -m pytest tests/test_smoke_suite.py -q 2>&1 | Tee-Object -FilePath pytest.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Print pytest log after failure
        if: failure()
        shell: pwsh
        run: Get-Content pytest.log
      - run: python .\tests\mcp_smoke.py
